name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /home/ec2-user

            # clean deploy
            rm -rf backend-temp
            git clone git@github.com:Rajeev735/Geofence-Backend.git backend-temp

            cd backend-temp

            npm install
            npm run build

            # replace old backend
            rm -rf /home/ec2-user/Geofence-Backend
            mv /home/ec2-user/backend-temp /home/ec2-user/Geofence-Backend

            # restart
            pm2 reload geofence-backend || pm2 start dist/server.js --name geofence-backend
