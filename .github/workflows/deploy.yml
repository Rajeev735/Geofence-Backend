name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Backend to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /home/ec2-user

            # Clean previous temp deployment
            rm -rf backend-temp

            # Clone fresh backend
            git clone git@github.com:Rajeev735/Geofence-Backend.git backend-temp

            cd backend-temp

            # Install dependencies (clean install)
            npm ci

            # Fix permission issue for TypeScript
            chmod -R 755 node_modules/.bin

            # Build backend
            npm run build

            # Replace old backend with new one
            rm -rf /home/ec2-user/Geofence-Backend
            mv /home/ec2-user/backend-temp /home/ec2-user/Geofence-Backend

            # Restart backend (zero downtime)
            pm2 reload geofence-backend || pm2 start dist/server.js --name geofence-backend
